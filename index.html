<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0e14">
<title>MeetNote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0e14;
    --surface: #13161f;
    --surface2: #1a1e2a;
    --border: rgba(255,255,255,0.07);
    --accent: #e8a44a;
    --accent2: #c97b2a;
    --text: #eef0f6;
    --text2: #8a8fa8;
    --text3: #555a72;
    --red: #e05c5c;
    --green: #4ecb8d;
    --blue: #5b9cf0;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }
  body { font-family: 'Noto Sans KR', sans-serif; color: var(--text); }

  /* ── LAYOUT ── */
  .app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; overflow: hidden; }

  /* ── VIEWS ── */
  .view { position: absolute; inset: 0; display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(.4,0,.2,1), opacity 0.4s; }
  .view.hidden { opacity: 0; pointer-events: none; }
  .view.slide-left { transform: translateX(-100%); }
  .view.slide-right { transform: translateX(100%); }

  /* ── HOME ── */
  .home-header { padding: 56px 24px 20px; }
  .home-header .brand { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--text); letter-spacing: -0.5px; }
  .home-header .brand span { color: var(--accent); font-style: italic; }
  .home-header .subtitle { color: var(--text2); font-size: 13px; margin-top: 4px; font-weight: 300; }

  .meeting-list { flex: 1; overflow-y: auto; padding: 8px 16px 120px; }
  .meeting-list::-webkit-scrollbar { display: none; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; gap: 12px; }
  .empty-state .icon { font-size: 48px; opacity: 0.3; }
  .empty-state p { color: var(--text3); font-size: 14px; }

  .meeting-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; cursor: pointer; transition: transform 0.15s, background 0.15s; position: relative; overflow: hidden; }
  .meeting-card:active { transform: scale(0.98); background: var(--surface2); }
  .meeting-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 3px 0 0 3px; }
  .meeting-card .card-date { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .meeting-card .card-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
  .meeting-card .card-preview { font-size: 12px; color: var(--text2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .meeting-card .card-meta { display: flex; gap: 10px; margin-top: 10px; }
  .meeting-card .tag { font-size: 10px; background: var(--surface2); color: var(--text3); padding: 3px 8px; border-radius: 20px; }

  /* ── FAB ── */
  .fab { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); width: 64px; height: 64px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(232,164,74,0.4); transition: transform 0.2s, box-shadow 0.2s; z-index: 100; }
  .fab:active { transform: translateX(-50%) scale(0.92); box-shadow: 0 4px 16px rgba(232,164,74,0.3); }
  .fab svg { width: 28px; height: 28px; fill: #0c0e14; }

  /* ── RECORD VIEW ── */
  .rec-header { display: flex; align-items: center; gap: 12px; padding: 56px 24px 20px; }
  .btn-back { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .btn-back svg { width: 18px; height: 18px; fill: none; stroke: var(--text); stroke-width: 2; }
  .rec-title-input { flex: 1; background: none; border: none; outline: none; font-size: 17px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; color: var(--text); }
  .rec-title-input::placeholder { color: var(--text3); }

  /* Wave */
  .wave-section { display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
  .wave-ring { width: 120px; height: 120px; position: relative; display: flex; align-items: center; justify-content: center; }
  .wave-ring .pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: rgba(232,164,74,0.12); animation: none; }
  .wave-ring .pulse.active { animation: pulse 1.5s ease-out infinite; }
  @keyframes pulse { 0% { transform: scale(0.7); opacity: 0.6; } 100% { transform: scale(1.5); opacity: 0; } }
  .wave-ring .pulse2 { animation-delay: 0.5s; }
  .rec-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--surface); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; z-index: 1; position: relative; }
  .rec-btn.recording { background: var(--red); border-color: var(--red); }
  .rec-btn:active { transform: scale(0.94); }
  .rec-icon { width: 28px; height: 28px; border-radius: 50%; background: var(--red); transition: all 0.2s; }
  .rec-btn.recording .rec-icon { border-radius: 6px; background: white; width: 24px; height: 24px; }

  .rec-timer { font-size: 13px; color: var(--text2); margin-top: 14px; letter-spacing: 1px; font-weight: 300; }
  .rec-status { font-size: 12px; margin-top: 6px; color: var(--text3); }
  .rec-status.live { color: var(--green); }

  /* Live transcript */
  .transcript-box { flex: 1; overflow-y: auto; padding: 0 20px 16px; }
  .transcript-box::-webkit-scrollbar { display: none; }
  .transcript-label { font-size: 11px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; padding: 0 4px; }
  .transcript-text { font-size: 14px; line-height: 1.8; color: var(--text2); white-space: pre-wrap; min-height: 80px; }
  .transcript-text .interim { color: var(--text3); font-style: italic; }

  .rec-actions { padding: 16px 20px 36px; display: flex; gap: 10px; }
  .btn-action { flex: 1; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500; transition: all 0.15s; }
  .btn-discard { background: var(--surface2); color: var(--text2); }
  .btn-save { background: var(--accent); color: #0c0e14; }
  .btn-action:active { transform: scale(0.97); }
  .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── DETAIL VIEW ── */
  .detail-header { padding: 56px 24px 16px; display: flex; align-items: flex-start; gap: 12px; }
  .detail-header-info { flex: 1; }
  .detail-header-info h2 { font-size: 20px; font-weight: 700; line-height: 1.3; }
  .detail-header-info .detail-date { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .btn-delete { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .btn-delete svg { width: 16px; height: 16px; fill: none; stroke: var(--red); stroke-width: 2; }

  .detail-scroll { flex: 1; overflow-y: auto; padding: 0 20px 40px; }
  .detail-scroll::-webkit-scrollbar { display: none; }

  .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .section-card .sec-label { font-size: 11px; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; font-weight: 500; margin-bottom: 10px; }
  .section-card .sec-content { font-size: 13.5px; line-height: 1.8; color: var(--text2); white-space: pre-wrap; }

  .summary-loading { display: flex; align-items: center; gap: 8px; color: var(--text3); font-size: 13px; }
  .dot-anim { display: flex; gap: 4px; }
  .dot-anim span { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: dot-bounce 1.2s ease-in-out infinite; }
  .dot-anim span:nth-child(2) { animation-delay: 0.2s; }
  .dot-anim span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-bounce { 0%,60%,100% { transform: translateY(0); opacity:0.4; } 30% { transform: translateY(-6px); opacity:1; } }

  .keywords { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
  .kw { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); font-size: 12px; padding: 4px 12px; border-radius: 20px; }
  .kw.accent { border-color: var(--accent); color: var(--accent); background: rgba(232,164,74,0.08); }

  .action-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .action-item:last-child { border-bottom: none; }
  .action-item .ai-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); flex-shrink: 0; margin-top: 6px; }
  .action-item .ai-text { font-size: 13.5px; line-height: 1.6; color: var(--text2); }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 13px; padding: 10px 20px; border-radius: 30px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── CONFIRM MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 500; }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal-box { background: var(--surface); border-radius: 20px 20px 0 0; padding: 28px 24px 40px; width: 100%; max-width: 480px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(.4,0,.2,1); }
  .modal-overlay.show .modal-box { transform: translateY(0); }
  .modal-box h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .modal-box p { font-size: 13px; color: var(--text2); margin-bottom: 24px; line-height: 1.6; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500; }
  .modal-cancel { background: var(--surface2); color: var(--text2); }
  .modal-confirm { background: var(--red); color: white; }
</style>
</head>
<body>
<div class="app">

  <!-- ══════ HOME VIEW ══════ -->
  <div class="view" id="viewHome">
    <div class="home-header">
      <div class="brand">Meet<span>Note</span></div>
      <div class="subtitle">AI 회의 기록 & 요약</div>
    </div>
    <div class="meeting-list" id="meetingList">
      <div class="empty-state" id="emptyState">
        <div class="icon">🎙️</div>
        <p>아래 버튼을 눌러 첫 회의를 녹음해 보세요</p>
      </div>
    </div>
    <button class="fab" id="fabBtn">
      <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-8 10a8 8 0 0 0 16 0h-2a6 6 0 0 1-12 0H4zm8 10v-3h-2v3H7v2h10v-2h-3z"/></svg>
    </button>
  </div>

  <!-- ══════ RECORD VIEW ══════ -->
  <div class="view hidden slide-right" id="viewRecord">
    <div class="rec-header">
      <button class="btn-back" id="recBack">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <input class="rec-title-input" id="recTitleInput" type="text" placeholder="회의 제목 (선택)" maxlength="50">
    </div>

    <div class="wave-section">
      <div class="wave-ring">
        <div class="pulse" id="pulse1"></div>
        <div class="pulse pulse2" id="pulse2"></div>
        <button class="rec-btn" id="recBtn">
          <div class="rec-icon" id="recIcon"></div>
        </button>
      </div>
      <div class="rec-timer" id="recTimer">00:00</div>
      <div class="rec-status" id="recStatus">탭하여 녹음 시작</div>
    </div>

    <div class="transcript-box">
      <div class="transcript-label">실시간 전사</div>
      <div class="transcript-text" id="transcriptText">
        <span style="color:var(--text3); font-size:13px;">녹음을 시작하면 텍스트가 여기에 표시됩니다</span>
      </div>
    </div>

    <div class="rec-actions">
      <button class="btn-action btn-discard" id="btnDiscard">버리기</button>
      <button class="btn-action btn-save" id="btnSave" disabled>저장 & 요약</button>
    </div>
  </div>

  <!-- ══════ DETAIL VIEW ══════ -->
  <div class="view hidden slide-right" id="viewDetail">
    <div class="detail-header">
      <button class="btn-back" id="detailBack">
        <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:var(--text);stroke-width:2;"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="detail-header-info">
        <h2 id="detailTitle"></h2>
        <div class="detail-date" id="detailDate"></div>
      </div>
      <button class="btn-delete" id="btnDelete">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
      </button>
    </div>
    <div class="detail-scroll">
      <div class="section-card" id="summaryCard">
        <div class="sec-label">AI 요약</div>
        <div id="summaryContent"></div>
      </div>
      <div class="section-card" id="keywordsCard">
        <div class="sec-label">핵심 키워드</div>
        <div class="keywords" id="keywordsContent"></div>
      </div>
      <div class="section-card" id="actionsCard">
        <div class="sec-label">액션 아이템</div>
        <div id="actionsContent"></div>
      </div>
      <div class="section-card">
        <div class="sec-label">전체 내용</div>
        <div class="sec-content" id="detailTranscript"></div>
      </div>
    </div>
  </div>

</div><!-- end .app -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3 id="modalTitle">녹음을 버리시겠어요?</h3>
    <p id="modalMsg">저장되지 않은 내용은 복구할 수 없습니다.</p>
    <div class="modal-btns">
      <button class="modal-cancel" id="modalCancel">취소</button>
      <button class="modal-confirm" id="modalConfirm">확인</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────
let meetings = JSON.parse(localStorage.getItem('meetnote_v1') || '[]');
let isRecording = false;
let recognition = null;
let timerInterval = null;
let elapsedSeconds = 0;
let fullTranscript = '';
let interimText = '';
let currentDetailId = null;
let pendingModalAction = null;

// ── UTILS ──────────────────────────────────────────────────────────────
function saveMeetings() { localStorage.setItem('meetnote_v1', JSON.stringify(meetings)); }

function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function showModal(title, msg, onConfirm) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMsg').textContent = msg;
  pendingModalAction = onConfirm;
  document.getElementById('modalOverlay').classList.add('show');
}

function hideModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}. ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatDuration(sec) {
  const m = Math.floor(sec/60), s = sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ── VIEW TRANSITIONS ───────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => {
    v.classList.add('hidden');
    v.classList.remove('slide-left', 'slide-right');
  });
  const target = document.getElementById(id);
  target.classList.remove('hidden');
  requestAnimationFrame(() => target.style.opacity = '1');
}

function goTo(id, direction = 'right') {
  const current = document.querySelector('.view:not(.hidden)');
  if (current) {
    current.classList.add(direction === 'right' ? 'slide-left' : 'slide-right');
    setTimeout(() => { current.classList.add('hidden'); current.classList.remove('slide-left','slide-right'); }, 400);
  }
  const target = document.getElementById(id);
  target.classList.add(direction === 'right' ? 'slide-right' : 'slide-left');
  target.classList.remove('hidden');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      target.classList.remove('slide-right', 'slide-left');
    });
  });
}

// ── HOME ───────────────────────────────────────────────────────────────
function renderHome() {
  const list = document.getElementById('meetingList');
  const empty = document.getElementById('emptyState');

  // remove old cards
  list.querySelectorAll('.meeting-card').forEach(c => c.remove());

  if (meetings.length === 0) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  const sorted = [...meetings].sort((a,b) => b.ts - a.ts);
  sorted.forEach(m => {
    const card = document.createElement('div');
    card.className = 'meeting-card';
    card.innerHTML = `
      <div class="card-date">${formatDate(m.ts)}</div>
      <div class="card-title">${m.title || '제목 없음'}</div>
      <div class="card-preview">${m.summary || m.transcript || '내용 없음'}</div>
      <div class="card-meta">
        <span class="tag">🕐 ${formatDuration(m.duration)}</span>
        ${m.keywords && m.keywords.length ? '<span class="tag">' + m.keywords.slice(0,2).join(', ') + '</span>' : ''}
      </div>
    `;
    card.addEventListener('click', () => openDetail(m.id));
    list.appendChild(card);
  });
}

// ── RECORD ─────────────────────────────────────────────────────────────
function startRecordView() {
  document.getElementById('recTitleInput').value = '';
  document.getElementById('recTimer').textContent = '00:00';
  document.getElementById('recStatus').textContent = '탭하여 녹음 시작';
  document.getElementById('recStatus').className = 'rec-status';
  document.getElementById('transcriptText').innerHTML = '<span style="color:var(--text3); font-size:13px;">녹음을 시작하면 텍스트가 여기에 표시됩니다</span>';
  document.getElementById('btnSave').disabled = true;
  document.getElementById('recBtn').classList.remove('recording');
  document.getElementById('pulse1').classList.remove('active');
  document.getElementById('pulse2').classList.remove('active');
  fullTranscript = '';
  interimText = '';
  isRecording = false;
  elapsedSeconds = 0;
  goTo('viewRecord', 'right');
}

function toggleRecording() {
  if (!isRecording) startRec();
  else stopRec();
}

function startRec() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('이 브라우저는 음성 인식을 지원하지 않습니다. Chrome 사용 권장');
    return;
  }
  isRecording = true;
  document.getElementById('recBtn').classList.add('recording');
  document.getElementById('pulse1').classList.add('active');
  document.getElementById('pulse2').classList.add('active');
  document.getElementById('recStatus').textContent = '녹음 중...';
  document.getElementById('recStatus').className = 'rec-status live';
  document.getElementById('btnSave').disabled = false;

  // timer
  timerInterval = setInterval(() => {
    elapsedSeconds++;
    document.getElementById('recTimer').textContent = formatDuration(elapsedSeconds);
  }, 1000);

  // speech recognition
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ko-KR';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        fullTranscript += e.results[i][0].transcript + ' ';
      } else {
        interim = e.results[i][0].transcript;
      }
    }
    interimText = interim;
    updateTranscriptDisplay();
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return;
    if (e.error === 'not-allowed') { showToast('마이크 권한이 필요합니다'); stopRec(); }
  };

  recognition.onend = () => {
    if (isRecording) recognition.start(); // auto-restart
  };

  recognition.start();
}

function stopRec() {
  isRecording = false;
  clearInterval(timerInterval);
  if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
  document.getElementById('recBtn').classList.remove('recording');
  document.getElementById('pulse1').classList.remove('active');
  document.getElementById('pulse2').classList.remove('active');
  document.getElementById('recStatus').textContent = '녹음 완료. 저장하거나 계속 녹음하세요.';
  document.getElementById('recStatus').className = 'rec-status';
  interimText = '';
  updateTranscriptDisplay();
}

function updateTranscriptDisplay() {
  const el = document.getElementById('transcriptText');
  if (!fullTranscript && !interimText) {
    el.innerHTML = '<span style="color:var(--text3); font-size:13px;">녹음을 시작하면 텍스트가 여기에 표시됩니다</span>';
    return;
  }
  el.innerHTML = (fullTranscript || '') + (interimText ? `<span class="interim">${interimText}</span>` : '');
  el.scrollTop = el.scrollHeight;
}

// ── SAVE & SUMMARIZE ───────────────────────────────────────────────────
async function saveAndSummarize() {
  if (isRecording) stopRec();
  const title = document.getElementById('recTitleInput').value.trim() || `회의 ${new Date().toLocaleDateString('ko-KR')}`;
  const transcript = fullTranscript.trim();
  if (!transcript) { showToast('전사된 내용이 없습니다'); return; }

  const id = Date.now().toString();
  const meeting = { id, title, ts: Date.now(), duration: elapsedSeconds, transcript, summary: null, keywords: [], actionItems: [] };
  meetings.unshift(meeting);
  saveMeetings();

  goTo('viewHome', 'left');
  renderHome();
  openDetail(id, true);

  // async summarize
  summarizeMeeting(id, transcript);
}

async function summarizeMeeting(id, transcript) {
  const el = document.getElementById('summaryContent');
  if (!el) return;

  el.innerHTML = `<div class="summary-loading">AI 분석 중 <div class="dot-anim"><span></span><span></span><span></span></div></div>`;
  document.getElementById('keywordsContent').innerHTML = '';
  document.getElementById('actionsContent').innerHTML = '';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `당신은 회의 내용을 분석하는 AI 비서입니다. 반드시 아래 JSON 형식만 반환하세요. 다른 텍스트나 마크다운 코드블록은 절대 포함하지 마세요.
{
  "summary": "3-5문장의 회의 요약",
  "keywords": ["키워드1", "키워드2", "키워드3", "키워드4", "키워드5"],
  "actionItems": ["액션아이템1", "액션아이템2", "액션아이템3"]
}`,
        messages: [{ role: 'user', content: `다음 회의 내용을 분석해 주세요:\n\n${transcript}` }]
      })
    });
    const data = await resp.json();
    const text = data.content?.map(c => c.text || '').join('') || '';
    const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());

    // update in storage
    const m = meetings.find(x => x.id === id);
    if (m) {
      m.summary = parsed.summary;
      m.keywords = parsed.keywords || [];
      m.actionItems = parsed.actionItems || [];
      saveMeetings();
    }

    // update UI if detail view is open for this meeting
    if (currentDetailId === id) renderDetailContent(m);
    renderHome();

  } catch(err) {
    if (currentDetailId === id) {
      document.getElementById('summaryContent').innerHTML = '<span style="color:var(--text3);font-size:13px;">요약을 가져오지 못했습니다. 인터넷 연결과 API 설정을 확인해 주세요.</span>';
    }
  }
}

// ── DETAIL ─────────────────────────────────────────────────────────────
function openDetail(id, skipNav = false) {
  const m = meetings.find(x => x.id === id);
  if (!m) return;
  currentDetailId = id;
  document.getElementById('detailTitle').textContent = m.title || '제목 없음';
  document.getElementById('detailDate').textContent = formatDate(m.ts) + ' • ' + formatDuration(m.duration);
  document.getElementById('detailTranscript').textContent = m.transcript || '';
  renderDetailContent(m);
  if (!skipNav) goTo('viewDetail', 'right');
  else {
    setTimeout(() => goTo('viewDetail', 'right'), 200);
  }
}

function renderDetailContent(m) {
  // Summary
  const summaryEl = document.getElementById('summaryContent');
  if (m.summary) {
    summaryEl.innerHTML = `<div class="sec-content">${m.summary}</div>`;
  } else if (!summaryEl.querySelector('.summary-loading')) {
    summaryEl.innerHTML = `<div class="summary-loading">AI 분석 중 <div class="dot-anim"><span></span><span></span><span></span></div></div>`;
  }

  // Keywords
  const kwEl = document.getElementById('keywordsContent');
  kwEl.innerHTML = '';
  if (m.keywords && m.keywords.length) {
    m.keywords.forEach((kw, i) => {
      const span = document.createElement('span');
      span.className = 'kw' + (i === 0 ? ' accent' : '');
      span.textContent = kw;
      kwEl.appendChild(span);
    });
  } else if (!m.summary) {
    kwEl.innerHTML = '<span style="color:var(--text3);font-size:13px;">분석 중...</span>';
  }

  // Action items
  const actEl = document.getElementById('actionsContent');
  actEl.innerHTML = '';
  if (m.actionItems && m.actionItems.length) {
    m.actionItems.forEach(item => {
      actEl.innerHTML += `<div class="action-item"><div class="ai-dot"></div><div class="ai-text">${item}</div></div>`;
    });
  } else if (!m.summary) {
    actEl.innerHTML = '<span style="color:var(--text3);font-size:13px;">분석 중...</span>';
  } else {
    actEl.innerHTML = '<span style="color:var(--text3);font-size:13px;">액션 아이템 없음</span>';
  }
}

function deleteMeeting() {
  showModal('회의를 삭제하시겠어요?', '삭제된 회의는 복구할 수 없습니다.', () => {
    meetings = meetings.filter(m => m.id !== currentDetailId);
    saveMeetings();
    renderHome();
    goTo('viewHome', 'left');
    showToast('삭제되었습니다');
  });
}

// ── EVENT LISTENERS ────────────────────────────────────────────────────
document.getElementById('fabBtn').addEventListener('click', startRecordView);
document.getElementById('recBtn').addEventListener('click', toggleRecording);

document.getElementById('recBack').addEventListener('click', () => {
  if (isRecording || fullTranscript) {
    showModal('녹음을 종료하시겠어요?', '저장하지 않은 내용은 사라집니다.', () => {
      if (isRecording) stopRec();
      fullTranscript = '';
      goTo('viewHome', 'left');
    });
  } else {
    goTo('viewHome', 'left');
  }
});

document.getElementById('btnDiscard').addEventListener('click', () => {
  if (!isRecording && !fullTranscript) { goTo('viewHome', 'left'); return; }
  showModal('녹음을 버리시겠어요?', '저장되지 않은 내용은 복구할 수 없습니다.', () => {
    if (isRecording) stopRec();
    fullTranscript = '';
    goTo('viewHome', 'left');
  });
});

document.getElementById('btnSave').addEventListener('click', saveAndSummarize);
document.getElementById('detailBack').addEventListener('click', () => goTo('viewHome', 'left'));
document.getElementById('btnDelete').addEventListener('click', deleteMeeting);

document.getElementById('modalCancel').addEventListener('click', hideModal);
document.getElementById('modalConfirm').addEventListener('click', () => {
  hideModal();
  if (pendingModalAction) { pendingModalAction(); pendingModalAction = null; }
});
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) hideModal();
});

// ── INIT ───────────────────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
